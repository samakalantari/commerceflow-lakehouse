networks:
  internal:
    name: ${COMPOSE_PROJECT_NAME}_internal

  traefik_network:
    name: ${TRAEFIK_NETWORK}
    external: true


volumes:
  postgres_data:
  clickhouse_data:
  mongodb_data:
  minio_data:
  spark_logs:
  spark_ivy:
  airflow_logs:
  prometheus_data:
  grafana_data:


x-common-service: &common-service
  restart: unless-stopped
  networks:
    - internal


services:

  #──────────────────────────────────────────────────────────────────────
  # ClickHouse
  #──────────────────────────────────────────────────────────────────────
  clickhouse:
    <<: *common-service
    image: ${CLICKHOUSE_IMAGE}
    ports:
      - "${BIND_IP}:${CLICKHOUSE_HTTP_PORT}:8123"
      - "${BIND_IP}:${CLICKHOUSE_NATIVE_PORT}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=$$CLICKHOUSE_USER --password=$$CLICKHOUSE_PASSWORD --query='SELECT 1'"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - internal
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.clickhouse.rule=Host(`clickhouse.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.clickhouse.entrypoints=web"
      - "traefik.http.services.clickhouse.loadbalancer.server.port=8123"

  #──────────────────────────────────────────────────────────────────────
  # PostgreSQL
  #──────────────────────────────────────────────────────────────────────
  postgres:
    <<: *common-service
    image: ${POSTGRES_IMAGE}
    ports:
      - "${BIND_IP}:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  #──────────────────────────────────────────────────────────────────────
  # MongoDB
  #──────────────────────────────────────────────────────────────────────
  mongodb:
    <<: *common-service
    image: ${MONGODB_IMAGE}
    ports:
      - "${BIND_IP}:${MONGO_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

  #──────────────────────────────────────────────────────────────────────
  # MinIO
  #──────────────────────────────────────────────────────────────────────
  minio:
    <<: *common-service
    image: ${MINIO_IMAGE}
    ports:
      - "${BIND_IP}:${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - internal
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

      - "traefik.http.routers.minio-api.rule=Host(`storage-api.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.minio-api.entrypoints=web"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"

      - "traefik.http.routers.minio-console.rule=Host(`storage.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  minio-init:
    image: ${MINIO_MC_IMAGE}
    depends_on:
      - minio
    restart: "no"
    networks:
      - internal
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

      MINIO_BUCKET: ${MINIO_BUCKET}

    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        echo "Waiting for MinIO..."

        until mc alias set \
          admin \
          http://minio:9000 \
          "$${MINIO_ROOT_USER}" \
          "$${MINIO_ROOT_PASSWORD}" \
          >/dev/null 2>&1
        do
          sleep 2
        done
        
        echo "MinIO is ready."

        echo "Creating bucket..."

        mc mb \
          --ignore-existing \
          "admin/$${MINIO_BUCKET}"

        echo "Creating Spark user..."

        if mc admin user info \
          admin \
          "$${MINIO_ACCESS_KEY}" \
          >/dev/null 2>&1
        then
          echo "Spark user already exists: $${MINIO_ACCESS_KEY}"
        else
          mc admin user add \
            admin \
            "$${MINIO_ACCESS_KEY}" \
            "$${MINIO_SECRET_KEY}"

          echo "Spark user created: $${MINIO_ACCESS_KEY}"
        fi

        echo "Attaching readwrite policy..."

        mc admin policy attach \
          admin \
          readwrite \
          --user "$${MINIO_ACCESS_KEY}"

        echo "Validating Spark user..."

        mc admin user info \
          admin \
          "$${MINIO_ACCESS_KEY}"

        echo "MinIO initialization completed."
        
  #──────────────────────────────────────────────────────────────────────
  # Spark
  #──────────────────────────────────────────────────────────────────────
  spark-master:
    <<: *common-service
    image: ${SPARK_IMAGE}
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HOME: /tmp
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
      PYTHONPATH: /opt/spark-apps
      PYTHONDONTWRITEBYTECODE: "1"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-transactional.orders}
      KAFKA_STARTING_OFFSETS: ${KAFKA_STARTING_OFFSETS:-earliest}
      KAFKA_MAX_OFFSETS_PER_TRIGGER: ${KAFKA_MAX_OFFSETS_PER_TRIGGER:-10000}
      SPARK_CHECKPOINT_BASE: ${SPARK_CHECKPOINT_BASE:-/opt/spark-data/checkpoints}
      STREAM_QUERY_VERSION: ${STREAM_QUERY_VERSION:-v1}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE}
      MINIO_BUCKET: ${MINIO_BUCKET}
      BRONZE_KAFKA_BASE_PATH: ${BRONZE_KAFKA_BASE_PATH}
    volumes:
      - spark_logs:/opt/spark/logs
      - spark_ivy:/tmp/.ivy2
      - ./spark-apps:/opt/spark-apps:ro
      - ./spark-data:/opt/spark-data
    networks:
      - internal
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.spark-master.rule=Host(`spark.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.spark-master.entrypoints=web"
      - "traefik.http.services.spark-master.loadbalancer.server.port=8080"

  spark-worker:
    <<: *common-service
    image: ${SPARK_IMAGE}
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HOME: /tmp
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
      PYTHONPATH: /opt/spark-apps
      PYTHONDONTWRITEBYTECODE: "1"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-transactional.orders}
      KAFKA_STARTING_OFFSETS: ${KAFKA_STARTING_OFFSETS:-earliest}
      KAFKA_MAX_OFFSETS_PER_TRIGGER: ${KAFKA_MAX_OFFSETS_PER_TRIGGER:-10000}

      SPARK_CHECKPOINT_BASE: ${SPARK_CHECKPOINT_BASE:-/opt/spark-data/checkpoints}
      STREAM_QUERY_VERSION: ${STREAM_QUERY_VERSION:-v1}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE}
      MINIO_BUCKET: ${MINIO_BUCKET}
      BRONZE_KAFKA_BASE_PATH: ${BRONZE_KAFKA_BASE_PATH}
    volumes:
      - spark_logs:/opt/spark/logs
      - spark_ivy:/tmp/.ivy2
      - ./spark-apps:/opt/spark-apps:ro
      - ./spark-data:/opt/spark-data

  #──────────────────────────────────────────────────────────────────────
  # JupyterLab
  #──────────────────────────────────────────────────────────────────────
  jupyter:
    <<: *common-service
    build:
      context: .
      dockerfile: ./jupyter/Dockerfile
      args:
        SPARK_IMAGE: ${SPARK_IMAGE}    
    depends_on:
      - spark-master
    hostname: jupyter
    environment:
      HOME: /home/jupyter
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      SPARK_MASTER_URL: spark://spark-master:7077
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
      PYTHONPATH: /opt/spark-apps
      PYTHONDONTWRITEBYTECODE: "1"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-transactional.orders}
      KAFKA_STARTING_OFFSETS: ${KAFKA_STARTING_OFFSETS:-earliest}
      KAFKA_MAX_OFFSETS_PER_TRIGGER: ${KAFKA_MAX_OFFSETS_PER_TRIGGER:-10000}
      SPARK_CHECKPOINT_BASE: ${SPARK_CHECKPOINT_BASE:-/opt/spark-data/checkpoints}
      STREAM_QUERY_VERSION: ${STREAM_QUERY_VERSION:-v1}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE}
      MINIO_BUCKET: ${MINIO_BUCKET}
      BRONZE_KAFKA_BASE_PATH: ${BRONZE_KAFKA_BASE_PATH}

      PYSPARK_SUBMIT_ARGS: >-
        --master spark://spark-master:7077
        --conf spark.driver.host=jupyter
        --conf spark.driver.bindAddress=0.0.0.0
        --conf spark.driver.port=39000
        --conf spark.blockManager.port=39001
        pyspark-shell
    command:
      - /bin/bash
      - -c
      - >-
        exec /opt/bitnami/python/bin/python3 -m jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --ServerApp.root_dir=/home/jupyter/notebooks
        --IdentityProvider.token="$${JUPYTER_TOKEN}"
    expose:
      - "8888"
      - "39000"
      - "39001"
    volumes:
      - ./notebooks:/home/jupyter/notebooks
      - spark_ivy:/tmp/.ivy2
      - ./spark-apps:/opt/spark-apps
      - ./spark-data:/opt/spark-data
    networks:
      - internal
      - traefik_network
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /opt/bitnami/python/bin/python3 -c
          "import socket; s=socket.create_connection(('127.0.0.1', 8888), 5); s.close()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.jupyter.rule=Host(`jupyter.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.jupyter.entrypoints=web"
      - "traefik.http.routers.jupyter.service=jupyter"
      - "traefik.http.services.jupyter.loadbalancer.server.port=8888"



  #──────────────────────────────────────────────────────────────────────
  # Airflow
  #──────────────────────────────────────────────────────────────────────
  airflow-init:
    image: ${AIRFLOW_IMAGE}
    user: "${AIRFLOW_UID}:0"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
    restart: "no"

  airflow-webserver:
    image: ${AIRFLOW_IMAGE}
    user: "${AIRFLOW_UID}:0"
    restart: unless-stopped
    networks:
      - internal
      - traefik_network
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark-apps:/opt/spark-apps
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.airflow.rule=Host(`airflow.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.airflow.entrypoints=web"
      - "traefik.http.services.airflow.loadbalancer.server.port=8080"

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE}
    user: "${AIRFLOW_UID}:0"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./spark-apps:/opt/spark-apps
    command: scheduler

  #──────────────────────────────────────────────────────────────────────
  # Metabase
  #──────────────────────────────────────────────────────────────────────
  metabase:
    <<: *common-service
    image: ${METABASE_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    networks:
      - internal
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.metabase.rule=Host(`mb.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.metabase.entrypoints=web"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"

  #──────────────────────────────────────────────────────────────────────
  # Monitoring
  #──────────────────────────────────────────────────────────────────────
  statsd-exporter:
    <<: *common-service
    image: ${STATSD_EXPORTER_IMAGE}
    ports:
      - "${BIND_IP}:${STATSD_TCP_PORT}:9102"
      - "${BIND_IP}:${STATSD_UDP_PORT}:9125/udp"

  prometheus:
    <<: *common-service
    image: ${PROMETHEUS_IMAGE}
    depends_on:
      - statsd-exporter
    ports:
      - "${BIND_IP}:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
    networks:
      - internal
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    <<: *common-service
    image: ${GRAFANA_IMAGE}
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    networks:
      - internal
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN_SUFFIX}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
